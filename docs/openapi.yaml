openapi: 3.0.3

info:
  title: Order Service API
  version: "1.0.0"
  description: |
    Manages orders and order items. Validates cross-service references
    (customer, restaurant, menu items), enforces pricing + state machine.

servers:
  - url: http://localhost:3003
    description: Local (direct)
  - url: http://localhost:3000
    description: Local (via API Gateway)

tags:
  - name: Health
  - name: Orders

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        "200": { description: Service is up }

  /v1/orders:
    post:
      tags: [Orders]
      summary: Create an order
      description: |
        Validates customer, restaurant, address, menu items.
        Pricing: subtotal = Σ(price × qty); tax = subtotal × 5%; delivery_fee = ₹30; total = subtotal + tax + delivery_fee.
        `total_from_client` must match computed total within ±0.01.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderCreate" }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }

    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: customer_id
          schema: { type: integer }
        - in: query
          name: restaurant_id
          schema: { type: integer }
        - in: query
          name: status
          schema:
            type: string
            enum: [CREATED, CONFIRMED, PREPARING, READY, DISPATCHED, DELIVERED, CANCELLED]
        - in: query
          name: payment_status
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED]
      responses:
        "200":
          description: Paginated list
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderList" } } }

  /v1/orders/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [Orders]
      summary: Get order by ID (includes items)
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/orders/{id}/confirm:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      tags: [Orders]
      summary: Confirm an order (CREATED → CONFIRMED)
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }
        "400": { $ref: "#/components/responses/ValidationError" }

  /v1/orders/{id}/cancel:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      tags: [Orders]
      summary: Cancel an order
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }

  /v1/orders/{id}/status:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    patch:
      tags: [Orders]
      summary: Advance order status (PREPARING/READY/DISPATCHED/DELIVERED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PREPARING, READY, DISPATCHED, DELIVERED]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }
        "400": { $ref: "#/components/responses/ValidationError" }

  /v1/orders/{id}/payment-status:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    patch:
      tags: [Orders]
      summary: Update payment status (called by payment-service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_status]
              properties:
                payment_status:
                  type: string
                  enum: [PENDING, SUCCESS, FAILED]
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderEnvelope" } } }

components:
  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }

  schemas:
    OrderCreate:
      type: object
      required: [customer_id, restaurant_id, address_id, items, total_from_client]
      properties:
        customer_id: { type: integer, example: 1 }
        restaurant_id: { type: integer, example: 1 }
        address_id: { type: integer, example: 1 }
        items:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [item_id, quantity]
            properties:
              item_id: { type: integer, example: 1 }
              quantity: { type: integer, minimum: 1, maximum: 5, example: 2 }
        total_from_client: { type: number, minimum: 0.01, example: 660.00 }

    Order:
      type: object
      properties:
        order_id: { type: integer }
        customer_id: { type: integer }
        restaurant_id: { type: integer }
        restaurant_name: { type: string }
        address_id: { type: integer }
        address_city: { type: string }
        subtotal: { type: number }
        tax: { type: number }
        delivery_fee: { type: number }
        total: { type: number }
        status:
          type: string
          enum: [CREATED, CONFIRMED, PREPARING, READY, DISPATCHED, DELIVERED, CANCELLED]
        payment_status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        created_at: { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        item_id: { type: integer }
        item_name: { type: string }
        price: { type: number }
        quantity: { type: integer }
        line_total: { type: number }

    OrderEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Order" }

    OrderList:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    Error:
      type: object
      required: [code, message, correlationId]
      properties:
        code: { type: string }
        message: { type: string }
        correlationId: { type: string, format: uuid }

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
